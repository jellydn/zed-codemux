# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "local"
hooks = [
    { id = "fmt", name = "cargo fmt", entry = "cargo fmt -- --check", language = "system", types = ["rust"] },
    { id = "clippy", name = "cargo clippy", entry = "cargo clippy -- -D warnings", language = "system", pass_filenames = false },
    { id = "test", name = "cargo test", entry = "cargo test", language = "system", pass_filenames = false },
]
